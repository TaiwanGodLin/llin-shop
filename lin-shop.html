<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>林家的店 - 點餐系統</title>
    <style>
        :root {
            --primary-color: #8d6e63;
            --accent-color: #d84315;
            --bg-color: #fffaf0;
        }

        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background-color: var(--bg-color); margin: 0; padding: 15px; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--accent-color); margin: 5px 0; }
        
        .container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 380px; gap: 20px; }

        /* 菜單樣式 */
        .category-block { margin-bottom: 25px; }
        .category-title { 
            font-size: 1.3rem; font-weight: bold; color: white; 
            background: var(--primary-color); padding: 8px 15px; 
            border-radius: 8px 8px 0 0; border-left: 8px solid var(--accent-color);
        }

        .menu-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 12px; background: white; padding: 15px; border-radius: 0 0 8px 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .item-card { 
            border: 1px solid #eee; border-radius: 8px; padding: 12px; 
            text-align: center; cursor: pointer; transition: 0.2s;
        }
        .item-card:hover { border-color: var(--accent-color); background-color: #fffbf0; }
        .item-name { display: block; font-weight: bold; margin-bottom: 5px; }
        .item-price { color: var(--accent-color); font-weight: bold; }

        /* 購物車樣式 */
        .cart-panel { 
            background: white; padding: 20px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); height: fit-content; 
            position: sticky; top: 15px;
        }
        .cart-panel h3 { margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: #666; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }

        .cart-list { list-style: none; padding: 0; margin: 15px 0; max-height: 300px; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px dashed #eee; font-size: 0.95rem; }
        .remove-btn { color: #999; border: none; background: none; cursor: pointer; font-size: 1.2rem; }

        .total-price { font-size: 1.4rem; font-weight: bold; text-align: right; margin: 15px 0; color: var(--accent-color); }
        
        .btn-order { 
            width: 100%; background: var(--accent-color); color: white; border: none; 
            padding: 15px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; 
        }
        .btn-order:hover { background: #bf360c; }

        @media (max-width: 850px) { .container { grid-template-columns: 1fr; } .cart-panel { position: static; } }
    </style>
</head>
<body>

<div class="header">
    <h1>🏮 林家的店</h1>
    <p>古早味美食．用心料理</p>
</div>

<div class="container">
    <div class="menu-section">
        <div id="menu-display"></div>
    </div>

    <div class="cart-panel">
        <h3>🛒 結帳清單</h3>
        
        <div class="input-group">
            <label>桌號 / 姓名</label>
            <input type="text" id="table-num" class="form-control" placeholder="例如：3號桌 或 王先生">
        </div>

        <div class="input-group">
            <label>訂單備註</label>
            <input type="text" id="order-note" class="form-control" placeholder="例如：不要蔥、不要辣">
        </div>

        <ul class="cart-list" id="cart-list">
            <li style="text-align:center; color:#ccc; padding:20px;">請點擊左側菜單開始點餐</li>
        </ul>

        <div class="total-price">總計: NT$ <span id="total-amount">0</span></div>
        
        <button class="btn-order" onclick="submitOrder()">確認送出訂單</button>
        <p style="font-size: 0.8rem; color: #888; text-align: center; margin-top: 10px;">
            * 點擊後會開啟郵件程式發送訂單資訊
        </p>
    </div>
</div>

<script>
    // 菜單資料
    const menuData = [
        { cat: "飯類", items: [
            { name: "肉燥便當", price: 75 }, { name: "白切肉便當", price: 100 },
            { name: "肉燥飯(小)", price: 35 }, { name: "肉燥飯(中)", price: 50 }, { name: "肉燥飯(大)", price: 70 },
            { name: "米糕", price: 40 }
        ]},
        { cat: "麵類", items: [
            { name: "切仔麵(小)", price: 30 }, { name: "切仔麵(中)", price: 45 }, { name: "切仔麵(大)", price: 60 },
            { name: "意麵(小)", price: 35 }, { name: "意麵(中)", price: 50 }, { name: "意麵(大)", price: 70 },
            { name: "餛飩麵", price: 60 }, { name: "蚵仔麵", price: 80 }, { name: "排骨麵", price: 90 }
        ]},
        { cat: "湯類", items: [
            { name: "芋頭排骨湯", price: 60 }, { name: "苦瓜排骨湯", price: 50 }, { name: "金針排骨湯", price: 40 },
            { name: "蚵仔湯", price: 50 }, { name: "四神湯", price: 40 }, { name: "餛飩湯", price: 35 },
            { name: "貢丸湯", price: 20 }, { name: "豆腐湯", price: 15 }
        ]},
        { cat: "小菜", items: [
            { name: "大腸", price: 50 }, { name: "皮蛋豆腐", price: 45 }, { name: "肉束尾", price: 40 },
            { name: "三層肉", price: 40 }, { name: "筋仔肉", price: 40 }, { name: "粉腸", price: 40 },
            { name: "燙A菜", price: 35 }, { name: "燙青菜", price: 30 }, { name: "白菜滷", price: 20 },
            { name: "豆干", price: 20 }, { name: "海帶", price: 20 }, { name: "筍子", price: 20 },
            { name: "豆皮", price: 20 }, { name: "滷蛋", price: 15 }
        ]}
    ];

    let cart = [];

    // 初始化菜單
    function initMenu() {
        const display = document.getElementById('menu-display');
        display.innerHTML = menuData.map(group => `
            <div class="category-block">
                <div class="category-title">${group.cat}</div>
                <div class="menu-grid">
                    ${group.items.map(item => `
                        <div class="item-card" onclick="addToCart('${item.name}', ${item.price})">
                            <span class="item-name">${item.name}</span>
                            <span class="item-price">$${item.price}</span>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    // 加入購物車
    window.addToCart = (name, price) => {
        const exist = cart.find(i => i.name === name);
        if (exist) {
            exist.qty++;
        } else {
            cart.push({ name, price, qty: 1 });
        }
        renderCart();
    };

    // 刪除品項
    window.removeFromCart = (name) => {
        cart = cart.filter(i => i.name !== name);
        renderCart();
    };

    // 渲染購物車
    function renderCart() {
        const list = document.getElementById('cart-list');
        const totalDisp = document.getElementById('total-amount');
        
        if (cart.length === 0) {
            list.innerHTML = '<li style="text-align:center; color:#ccc; padding:20px;">請點擊左側菜單開始點餐</li>';
            totalDisp.innerText = '0';
            return;
        }

        list.innerHTML = cart.map(item => `
            <li class="cart-item">
                <span>${item.name} x ${item.qty}</span>
                <span>$${item.price * item.qty} 
                    <button class="remove-btn" onclick="event.stopPropagation(); removeFromCart('${item.name}')">×</button>
                </span>
            </li>
        `).join('');

        totalDisp.innerText = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
    }

    // 送出訂單
    window.submitOrder = () => {
        if (cart.length === 0) {
            alert("購物車內還沒有餐點喔！");
            return;
        }

        const table = document.getElementById('table-num').value || "未註記桌號";
        const note = document.getElementById('order-note').value || "無";
        const total = document.getElementById('total-amount').innerText;
        
        // 這裡請換成您的收件 Email
        const myEmail = "your-email@example.com"; 

        let details = `【林家的店 - 新訂單】\n`;
        details += `桌號/姓名：${table}\n`;
        details += `備註：${note}\n`;
        details += `------------------------\n`;
        cart.forEach(i => {
            details += `${i.name} x ${i.qty} = $${i.price * i.qty}\n`;
        });
        details += `------------------------\n`;
        details += `總計金額：NT$ ${total}`;

        const subject = encodeURIComponent(`林家的店訂單 - ${table}`);
        const body = encodeURIComponent(details);
        
        window.location.href = `mailto:${myEmail}?subject=${subject}&body=${body}`;

        alert("已為您準備好訂單內容！請在跳出的郵件程式點擊發送。");
    };

    initMenu();
</script>

</body>
</html>
